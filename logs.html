<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>事件紀錄 - 瑕疵辨識與分流系統</title>

  <link rel="stylesheet" href="style.css" />

  <!-- ✅ PWA 必加 -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <script src="core.js"></script>

  <div id="overlay" class="drawerOverlay" onclick="toggleDrawer(false)"></div>
  <aside id="drawer" class="drawer">
    <div class="sidebar" style="display:block; position:static; height:100vh;">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>瑕疵辨識與分流系統</h1>
          <p>多頁系統版本（PWA）</p>
        </div>
      </div>

      <div class="nav">
        <a href="dashboard.html">🏠 Dashboard <span class="pill">Home</span></a>
        <a href="logs.html">🧾 事件紀錄 <span class="pill">Logs</span></a>
        <a href="settings.html">⚙️ 系統設定 <span class="pill">Settings</span></a>
        <button onclick="logout()">🚪 登出 <span class="pill">Logout</span></button>
      </div>
    </div>
  </aside>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>瑕疵辨識與分流系統</h1>
          <p>多頁系統版本（PWA）</p>
        </div>
      </div>

      <div class="nav">
        <a href="dashboard.html">🏠 Dashboard <span class="pill">Home</span></a>
        <a href="logs.html">🧾 事件紀錄 <span class="pill">Logs</span></a>
        <a href="settings.html">⚙️ 系統設定 <span class="pill">Settings</span></a>
        <button onclick="logout()">🚪 登出 <span class="pill">Logout</span></button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="leftTop">
          <button class="hamburger" onclick="toggleDrawer(true)">☰</button>
          <div class="pageTitle">
            <b>事件紀錄</b>
            <span>最近事件列表（最多 50 筆）</span>
          </div>
        </div>
        <div class="rightTop">
          <button class="btn btnPrimary" onclick="seedLogs()">載入示範資料</button>
          <button class="btn" onclick="clearLogs()">清空</button>
        </div>
      </div>

      <section class="grid">
        <div class="card span-12">
          <h3>🧾 Logs</h3>
          <table>
            <thead>
              <tr>
                <th style="width:110px;">時間</th>
                <th style="width:90px;">狀態</th>
                <th>事件</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </section>

      <div id="errorBar"></div>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    function seedLogs(){
      pushLog("OK", "SYSTEM", "系統啟動完成");
      pushLog("OK", "MQTT", "連線正常");
      pushLog("NG", "defect_02", "分流：瑕疵區");
      pushLog("WARN", "Wi-Fi", "封包延遲略高");
      pushLog("OK", "area_A", "收集區 A +1");
    }

    function clearLogs(){
      const body = document.getElementById("logBody");
      if(body) body.innerHTML = "";
    }

    seedLogs();

    /* ✅ 註冊 Service Worker（PWA） */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(console.error);
    }
  </script>
</body>
</html>
